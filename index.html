<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>小龙虾大逃亡</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a1628;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  touch-action: none;
}
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let CW, CH;
function resize() {
  const ratio = window.devicePixelRatio || 1;
  const availW = Math.min(window.innerWidth, 420);
  const availH = window.innerHeight;
  let w, h;
  if (availW / availH < 9 / 16) { w = availW; h = availW / (9/16); }
  else { h = availH; w = availH * (9/16); }
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  canvas.width = Math.round(w * ratio);
  canvas.height = Math.round(h * ratio);
  ctx.scale(ratio, ratio);
  CW = w; CH = h;
}
resize();
window.addEventListener('resize', resize);

// ── CONSTANTS ──────────────────────────────────────────────
const BASE_SPEED   = 3;
const RIVER_FRAC   = 0.62;
const LANE_COUNT   = 3;
const SHIELD_DIST  = 300;   // every N meters → +1 shield charge
const HEAL_DIST    = 800;   // every N meters → +1 heal charge
const MAX_SHIELD_CHARGES = 3;
const MAX_HEAL_CHARGES   = 2;
const PLAYER_Y_MIN_FRAC  = 0.45;  // player can move up to here
const PLAYER_Y_MAX_FRAC  = 0.88;

// ── MONSTER TYPES ───────────────────────────────────────────
const MONSTER_TYPES = {
  worm:     { name:'毛毛虫', emoji:'🐛', hp:1, spd:1.4, minDist:0,    reward:5,  ranged:false, homing:false },
  crab:     { name:'螃蟹兵', emoji:'🦀', hp:2, spd:1.1, minDist:100,  reward:8,  ranged:false, homing:true  },
  frog:     { name:'青蛙',   emoji:'🐸', hp:1, spd:2.2, minDist:400,  reward:8,  ranged:false, homing:false, jumpy:true },
  scorpion: { name:'蝎子',   emoji:'🦂', hp:2, spd:0.9, minDist:200,  reward:12, ranged:true,  projEmoji:'🔴', shootCd:90 },
  octopus:  { name:'章鱼',   emoji:'🐙', hp:2, spd:1.0, minDist:500,  reward:15, ranged:true,  projEmoji:'🖤', shootCd:70, spread:true },
  lizard:   { name:'壁虎',   emoji:'🦎', hp:3, spd:1.4, minDist:1200, reward:20, ranged:true,  projEmoji:'🪨', shootCd:55, fast:true },
  boss:     { name:'BOSS',   emoji:'💀', hp:15,spd:1.5, minDist:500,  reward:80, ranged:true,  projEmoji:'💥', shootCd:45, boss:true },
};

// ── STATE ───────────────────────────────────────────────────
let state = 'menu';
let bestDist = +localStorage.getItem('ldx_best') || 0;
let totalCoins = +localStorage.getItem('ldx_coins') || 0;

let player, enemies, coins, particles, projectiles;
let distance, speed, bgScroll;
let spawnTimer, coinSpawnTimer;
let monstersAvoided, coinsCollected;
let bossNext, shakeTimer, darkOverlay;
let freezeTimer;

// skill state
let shieldCharges, healCharges;
let shieldActive, shieldTimer;
let nextShieldMilestone, nextHealMilestone;
let skillFlash; // { text, timer }

let riverLeft, riverRight;

// ── JOYSTICK (right side, full 2D) ──────────────────────────
const joy = {
  active: false, touchId: null,
  baseX: 0, baseY: 0,
  dx: 0, dy: 0,
  radius: 52, knobR: 24, maxDrag: 50,
};

// ── SKILL BUTTONS (left side) ────────────────────────────────
const btnShield = { pressed: false, touchId: null };
const btnHeal   = { pressed: false, touchId: null };

function getShieldBtnLayout() {
  const bw = 68, bh = 68;
  return { bx: 12, by: CH - bh * 2 - 24, bw, bh };
}
function getHealBtnLayout() {
  const bw = 68, bh = 68;
  return { bx: 12, by: CH - bh - 12, bw, bh };
}
function getJoyLayout() {
  const r = joy.radius;
  return { cx: CW - r - 16, cy: CH - r - 20 };
}

// ── INIT ────────────────────────────────────────────────────
function initGame() {
  riverLeft  = CW * (1 - RIVER_FRAC) / 2;
  riverRight = CW - riverLeft;

  player = {
    x: CW / 2,
    y: CH * 0.75,
    hp: 3, maxHp: 3,
    w: 40, h: 40,
    hitCooldown: 0, flashTimer: 0,
  };

  enemies     = [];
  coins       = [];
  particles   = [];
  projectiles = [];

  distance       = 0;
  speed          = BASE_SPEED;
  bgScroll       = 0;
  spawnTimer     = 80;
  coinSpawnTimer = 50;
  monstersAvoided = 0;
  coinsCollected  = 0;
  bossNext        = 500;
  shakeTimer      = 0;
  darkOverlay     = 0;
  freezeTimer     = 0;

  shieldCharges = 0;
  healCharges   = 0;
  shieldActive  = false;
  shieldTimer   = 0;
  nextShieldMilestone = SHIELD_DIST;
  nextHealMilestone   = HEAL_DIST;
  skillFlash    = null;
}

// ── PARTICLES ───────────────────────────────────────────────
function burst(x, y, color, n, emoji) {
  for (let i = 0; i < n; i++) {
    particles.push({
      x, y,
      vx: (Math.random()-0.5)*6, vy: (Math.random()-0.5)*6,
      life: 30+Math.random()*20, maxLife: 50,
      color: color||'#ff6600', emoji: emoji||null,
      size: emoji ? 16 : (3+Math.random()*4),
    });
  }
}

// ── SPAWN ENEMY ─────────────────────────────────────────────
function spawnEnemy() {
  const d = distance;
  if (d >= bossNext) { spawnBoss(); bossNext += 500; return; }

  let pool;
  if (d < 100)       pool = ['worm','worm','worm'];
  else if (d < 200)  pool = ['worm','worm','crab'];
  else if (d < 400)  pool = ['worm','crab','scorpion'];
  else if (d < 700)  pool = ['crab','frog','scorpion','octopus'];
  else if (d < 1200) pool = ['frog','scorpion','octopus','octopus'];
  else               pool = ['scorpion','octopus','lizard','lizard'];

  const key  = pool[Math.floor(Math.random()*pool.length)];
  const type = MONSTER_TYPES[key];
  const spd  = type.spd * (1 + d/2500);
  const margin = 24;
  const ex = riverLeft + margin + Math.random()*(riverRight - riverLeft - margin*2);

  enemies.push({
    x: ex, y: -50,
    hp: type.hp, maxHp: type.hp,
    type, speed: spd,
    flashTimer: 0, w: 34, h: 34,
    knockbackVy: 0,
    wobble: Math.random()*Math.PI*2,
    wobbleSpd: 0.03+Math.random()*0.03,
    shootTimer: type.ranged ? (type.shootCd + Math.random()*40) : 0,
    jumpTimer: 0,
  });
}

function spawnBoss() {
  const type = MONSTER_TYPES.boss;
  const extra = Math.floor(distance/500);
  enemies.push({
    x: CW/2, y: -80,
    hp: type.hp+extra, maxHp: type.hp+extra,
    type, speed: type.spd,
    flashTimer: 0, w: 56, h: 56,
    knockbackVy: 0, wobble: 0, wobbleSpd: 0.015,
    shootTimer: type.shootCd, jumpTimer: 0,
  });
}

// ── SPAWN COIN ──────────────────────────────────────────────
function spawnCoin() {
  const margin = 20;
  const cx = riverLeft + margin + Math.random()*(riverRight - riverLeft - margin*2);
  coins.push({ x: cx, y: -30, vy: 2.2+Math.random()*1.5, spin: 0, collected: false });
}

// ── SKILLS ──────────────────────────────────────────────────
function useShield() {
  if (shieldCharges <= 0 || shieldActive) return;
  shieldCharges--;
  shieldActive = true;
  shieldTimer  = 180; // 3s at 60fps
  skillFlash   = { text:'🛡️ 护盾激活！', timer:80, color:'#aaddff' };
  burst(player.x, player.y, '#aaddff', 10, '⭐');
}

function useHeal() {
  if (healCharges <= 0 || player.hp >= player.maxHp) return;
  healCharges--;
  player.hp++;
  skillFlash = { text:'❤️ 回血+1', timer:80, color:'#ff88aa' };
  burst(player.x, player.y, '#ff4466', 8, '❤️');
}

// ── DAMAGE PLAYER ───────────────────────────────────────────
function damagePlayer() {
  if (shieldActive || player.hitCooldown > 0) return;
  player.hp--;
  player.flashTimer  = 30;
  player.hitCooldown = 90;
  shakeTimer = 14;
  burst(player.x, player.y, '#ff0000', 10);
  if (player.hp <= 0) endGame();
}

// ── END GAME ────────────────────────────────────────────────
function endGame() {
  state = 'dead';
  const d = Math.floor(distance);
  if (d > bestDist) { bestDist = d; localStorage.setItem('ldx_best', d); }
  totalCoins += coinsCollected;
  localStorage.setItem('ldx_coins', totalCoins);
}

// ── UPDATE ──────────────────────────────────────────────────
function update() {
  if (state !== 'play') return;

  speed    = Math.min(BASE_SPEED + distance/300, 9);
  distance += speed/60*3;
  bgScroll  = (bgScroll + speed) % (CH*2);
  darkOverlay = distance > 2000 ? Math.min(0.38, (distance-2000)/2000) : 0;

  if (shakeTimer > 0) shakeTimer--;
  if (player.flashTimer > 0) player.flashTimer--;
  if (player.hitCooldown > 0) player.hitCooldown--;
  if (freezeTimer > 0) freezeTimer--;
  if (skillFlash && --skillFlash.timer <= 0) skillFlash = null;

  // Shield timer
  if (shieldActive) {
    shieldTimer--;
    if (shieldTimer <= 0) { shieldActive = false; }
  }

  // Milestone rewards
  while (distance >= nextShieldMilestone) {
    if (shieldCharges < MAX_SHIELD_CHARGES) {
      shieldCharges++;
      skillFlash = { text:`🛡️ +1 护盾技能 (${shieldCharges}/${MAX_SHIELD_CHARGES})`, timer:100, color:'#aaddff' };
    }
    nextShieldMilestone += SHIELD_DIST;
  }
  while (distance >= nextHealMilestone) {
    if (healCharges < MAX_HEAL_CHARGES) {
      healCharges++;
      skillFlash = { text:`❤️ +1 回血技能 (${healCharges}/${MAX_HEAL_CHARGES})`, timer:100, color:'#ffaacc' };
    }
    nextHealMilestone += HEAL_DIST;
  }

  // ── Player movement (right joystick, full 2D) ──
  const moveSpd = 5 + speed * 0.4;
  let vx = joy.dx * moveSpd;
  let vy = joy.dy * moveSpd;
  if (keys['ArrowLeft']  || keys['KeyA']) vx = -moveSpd;
  if (keys['ArrowRight'] || keys['KeyD']) vx =  moveSpd;
  if (keys['ArrowUp']    || keys['KeyW']) vy = -moveSpd;
  if (keys['ArrowDown']  || keys['KeyS']) vy =  moveSpd;
  player.x = Math.max(riverLeft  + player.w/2, Math.min(riverRight - player.w/2, player.x + vx));
  player.y = Math.max(CH * PLAYER_Y_MIN_FRAC,  Math.min(CH * PLAYER_Y_MAX_FRAC,  player.y + vy));

  // ── Spawn ──
  spawnTimer--;
  const rate = Math.max(16, 90 - distance/15);
  if (spawnTimer <= 0) { spawnEnemy(); spawnTimer = rate + Math.random()*25; }

  coinSpawnTimer--;
  if (coinSpawnTimer <= 0) {
    const n = Math.random() < 0.35 ? 3 : 1;
    for (let i=0;i<n;i++) spawnCoin();
    coinSpawnTimer = 35 + Math.random()*45;
  }

  // ── Update enemies ──
  const frozen = freezeTimer > 0;
  enemies.forEach(e => {
    if (e.hp < 0) return;
    if (e.flashTimer > 0) e.flashTimer--;
    if (e.knockbackVy !== 0) {
      e.y += e.knockbackVy;
      e.knockbackVy *= 0.75;
      if (Math.abs(e.knockbackVy) < 0.3) e.knockbackVy = 0;
    }

    if (!frozen) {
      e.wobble += e.wobbleSpd;
      if (e.type.homing) {
        // slowly track player horizontally
        const dx = player.x - e.x;
        e.x += Math.sign(dx) * Math.min(Math.abs(dx)*0.02+0.3, 1.5);
      } else {
        e.x += Math.sin(e.wobble) * 0.9;
      }
      if (e.type.jumpy) {
        e.jumpTimer = (e.jumpTimer||0) + 1;
        e.y += e.speed * (1 + Math.abs(Math.sin(e.wobble*2))*1.5) + speed*0.12;
      } else {
        e.y += e.speed + speed * 0.12;
      }
    }

    // clamp to river
    const em = e.w/2;
    e.x = Math.max(riverLeft+em, Math.min(riverRight-em, e.x));

    // ranged attack
    if (e.type.ranged && !frozen) {
      e.shootTimer--;
      if (e.shootTimer <= 0) {
        fireAt(e, player.x, player.y);
        e.shootTimer = e.type.shootCd + Math.random()*30;
      }
    }

    // melee collision
    if (!frozen) {
      const dx = Math.abs(e.x - player.x), dy = Math.abs(e.y - player.y);
      if (dx < 28 && dy < 28) damagePlayer();
    }

    if (e.y > CH + 60) { e.hp = -999; monstersAvoided++; }
  });
  enemies = enemies.filter(e => e.hp > -100);

  // ── Update projectiles ──
  projectiles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.life--;
    const dx = Math.abs(p.x - player.x), dy = Math.abs(p.y - player.y);
    if (dx < 22 && dy < 22) { damagePlayer(); p.life = 0; }
  });
  projectiles = projectiles.filter(p => p.life > 0 && p.y < CH+30 && p.y > -30 && p.x > -30 && p.x < CW+30);

  // ── Update coins ──
  coins.forEach(c => {
    c.y += c.vy; c.spin += 0.1;
    if (!c.collected) {
      const dx = Math.abs(c.x-player.x), dy = Math.abs(c.y-player.y);
      if (dx < 26 && dy < 26) { c.collected = true; coinsCollected++; burst(c.x, c.y, '#FFD700', 4); }
    }
  });
  coins = coins.filter(c => !c.collected && c.y < CH+40);

  // ── Update particles ──
  particles.forEach(p => { p.x+=p.vx; p.y+=p.vy; p.vy+=0.08; p.life--; });
  particles = particles.filter(p => p.life > 0);
}

function fireAt(e, tx, ty) {
  const dx = tx - e.x, dy = ty - e.y;
  const dist = Math.sqrt(dx*dx+dy*dy)||1;
  const spd  = e.type.fast ? 5 : 3.2;
  const em   = e.type.projEmoji || '💥';
  const base  = { x:e.x, y:e.y, vx:(dx/dist)*spd, vy:(dy/dist)*spd, life:100, emoji:em };
  projectiles.push({...base});
  if (e.type.spread) {
    [-0.35, 0.35].forEach(a => {
      const cos=Math.cos(a), sin=Math.sin(a);
      projectiles.push({ x:e.x, y:e.y,
        vx: base.vx*cos - base.vy*sin,
        vy: base.vx*sin + base.vy*cos,
        life:100, emoji:em });
    });
  }
  if (e.type.boss) {
    // boss fires 4 directions
    [[1,0],[-1,0],[0,-1]].forEach(([bx,by])=>{
      projectiles.push({ x:e.x, y:e.y, vx:bx*3, vy:by*3+1.5, life:80, emoji:em });
    });
  }
}

// ── DRAW ────────────────────────────────────────────────────
function draw() {
  const sx = shakeTimer>0?(Math.random()-0.5)*6:0;
  const sy = shakeTimer>0?(Math.random()-0.5)*4:0;
  ctx.save();
  ctx.translate(sx, sy);

  drawBg();
  coins.forEach(drawCoin);
  enemies.forEach(drawEnemy);
  drawPlayer();
  projectiles.forEach(drawProj);
  drawParticles();

  if (darkOverlay>0) { ctx.fillStyle=`rgba(0,0,0,${darkOverlay})`; ctx.fillRect(0,0,CW,CH); }
  if (freezeTimer>0) { ctx.fillStyle=`rgba(150,220,255,${0.18*(freezeTimer/120)})`; ctx.fillRect(0,0,CW,CH); }

  ctx.restore();

  drawHUD();
  drawControls();
  if (state==='menu') drawMenu();
  if (state==='dead')  drawDead();
}

// ── BACKGROUND ──────────────────────────────────────────────
function drawBg() {
  const rl=riverLeft, rr=riverRight, rw=rr-rl;

  // grass banks
  const lg=ctx.createLinearGradient(0,0,rl,0);
  lg.addColorStop(0,'#2d5a1b'); lg.addColorStop(1,'#3a7a28');
  ctx.fillStyle=lg; ctx.fillRect(0,0,rl,CH);
  const rg=ctx.createLinearGradient(rr,0,CW,0);
  rg.addColorStop(0,'#3a7a28'); rg.addColorStop(1,'#2d5a1b');
  ctx.fillStyle=rg; ctx.fillRect(rr,0,CW-rr,CH);

  // grass dots
  ctx.fillStyle='rgba(60,120,40,0.5)';
  const gs=22, go=bgScroll%gs;
  for(let y=-go;y<CH+gs;y+=gs)
    for(let x=4;x<rl-4;x+=gs) { ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill(); }
  for(let y=-go;y<CH+gs;y+=gs)
    for(let x=rr+4;x<CW-4;x+=gs) { ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill(); }

  // river
  const rv=ctx.createLinearGradient(rl,0,rr,0);
  rv.addColorStop(0,'#1a4a8a'); rv.addColorStop(0.5,'#1e5599'); rv.addColorStop(1,'#1a4a8a');
  ctx.fillStyle=rv; ctx.fillRect(rl,0,rw,CH);

  // ripples
  ctx.strokeStyle='rgba(100,180,255,0.22)'; ctx.lineWidth=1.5;
  const rsp=40, ro=bgScroll%rsp;
  for(let y=-ro;y<CH+rsp;y+=rsp) {
    ctx.beginPath(); ctx.moveTo(rl+8,y); ctx.lineTo(rr-8,y); ctx.stroke();
  }

  // lane dividers
  const lw=rw/LANE_COUNT;
  ctx.strokeStyle='rgba(255,255,255,0.28)'; ctx.lineWidth=2;
  ctx.setLineDash([28,20]); ctx.lineDashOffset=-(bgScroll%48);
  for(let l=1;l<LANE_COUNT;l++) {
    const lx=rl+lw*l; ctx.beginPath(); ctx.moveTo(lx,0); ctx.lineTo(lx,CH); ctx.stroke();
  }
  ctx.setLineDash([]);

  // borders
  ctx.strokeStyle='rgba(80,200,100,0.7)'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(rl,0); ctx.lineTo(rl,CH); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(rr,0); ctx.lineTo(rr,CH); ctx.stroke();
}

function drawCoin(c) {
  if (c.collected) return;
  const sx = Math.max(0.15, Math.abs(Math.cos(c.spin)));
  ctx.save();
  ctx.translate(c.x, c.y);
  ctx.scale(sx, 1);
  ctx.font='20px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('🪙',0,0);
  ctx.restore();
}

function drawEnemy(e) {
  if (e.hp<0) return;
  ctx.save();
  if (e.flashTimer>0 && Math.floor(e.flashTimer/2)%2===0) ctx.filter='brightness(3) saturate(0)';
  if (freezeTimer>0) ctx.filter='hue-rotate(180deg) brightness(1.5)';
  const sz = e.type.boss ? 50 : 28;
  ctx.font=`${sz}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(e.type.emoji, e.x, e.y);
  ctx.restore();

}

function drawPlayer() {
  ctx.save();
  const blink = shieldActive && Math.floor(Date.now()/80)%2===0;
  if (blink) { ctx.globalAlpha=0.55; ctx.filter='brightness(2) hue-rotate(200deg)'; }
  if (player.flashTimer>0 && Math.floor(player.flashTimer/3)%2===0) ctx.filter='brightness(3) saturate(0)';
  if (player.hitCooldown>0 && !shieldActive && Math.floor(player.hitCooldown/8)%2===0) ctx.globalAlpha=0.5;

  ctx.font='40px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('🦞', player.x, player.y);
  ctx.restore();

  // Shield bubble
  if (shieldActive) {
    ctx.save();
    ctx.strokeStyle=`rgba(100,180,255,${0.5+0.3*Math.sin(Date.now()/150)})`;
    ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(player.x, player.y, 30, 0, Math.PI*2); ctx.stroke();
    ctx.restore();
  }
}

function drawProj(p) {
  ctx.font='15px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(p.emoji||'💥', p.x, p.y);
}

function drawParticles() {
  particles.forEach(p => {
    const alpha = Math.max(0, p.life/p.maxLife);
    ctx.globalAlpha = alpha;
    if (p.emoji) {
      ctx.font=`${p.size}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(p.emoji, p.x, p.y);
    } else {
      ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.size/2,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;
  });
}

// ── HUD ─────────────────────────────────────────────────────
function drawHUD() {
  if (state==='menu') return;

  ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,0,CW,52);

  // Distance
  ctx.font='bold 18px sans-serif'; ctx.fillStyle='#FFD700';
  ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.fillText(`🏊 ${Math.floor(distance)}m`, CW/2, 6);
  ctx.font='12px sans-serif'; ctx.fillStyle='#aaddff';
  ctx.fillText(`最远: ${bestDist}m`, CW/2, 28);

  // HP
  ctx.font='22px serif'; ctx.textAlign='left'; ctx.textBaseline='top';
  for(let i=0;i<player.maxHp;i++) ctx.fillText(i<player.hp?'❤️':'🖤', 7+i*28, 6);

  // Coins top right
  ctx.font='13px sans-serif'; ctx.fillStyle='#FFD700'; ctx.textAlign='right';
  ctx.fillText(`🪙 ${coinsCollected}`, CW-7, 6);
  ctx.font='11px sans-serif'; ctx.fillStyle='#aaaaaa';
  ctx.fillText(`累计 ${totalCoins+coinsCollected}`, CW-7, 24);

  // Shield timer bar
  if (shieldActive) {
    ctx.fillStyle='rgba(100,180,255,0.3)'; ctx.fillRect(riverLeft,52, (riverRight-riverLeft)*(shieldTimer/180), 4);
  }

  // Skill flash
  if (skillFlash) {
    const alpha = Math.min(1, skillFlash.timer/30);
    ctx.save(); ctx.globalAlpha=alpha;
    ctx.font='bold 16px sans-serif'; ctx.fillStyle=skillFlash.color||'#ffffff';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(skillFlash.text, CW/2, CH*0.38);
    ctx.restore();
  }

  // Next milestone hints (small)
  const toShield = Math.ceil(nextShieldMilestone - distance);
  const toHeal   = Math.ceil(nextHealMilestone   - distance);
  ctx.font='10px sans-serif'; ctx.fillStyle='rgba(200,200,200,0.7)'; ctx.textAlign='left';
  if (shieldCharges < MAX_SHIELD_CHARGES) ctx.fillText(`🛡️ ${toShield}m`, 7, 40);
  if (healCharges < MAX_HEAL_CHARGES)     ctx.fillText(`❤️ ${toHeal}m`, 55, 40);
}

// ── CONTROLS DRAW ───────────────────────────────────────────
function rr(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

function drawControls() {
  if (state!=='play') return;
  const s = getShieldBtnLayout();
  const h = getHealBtnLayout();
  const j = getJoyLayout();

  // ── Shield button ──
  ctx.save();
  ctx.globalAlpha = shieldCharges>0 ? 0.9 : 0.4;
  ctx.fillStyle = shieldActive ? '#00aaff' : (shieldCharges>0 ? '#1155cc' : '#222244');
  rr(s.bx, s.by, s.bw, s.bh, 14); ctx.fill();
  ctx.strokeStyle='rgba(100,180,255,0.7)'; ctx.lineWidth=2; ctx.stroke();
  ctx.font='26px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('🛡️', s.bx+s.bw/2, s.by+s.bh/2-8);
  ctx.font='bold 12px sans-serif'; ctx.fillStyle='#ffffff';
  ctx.fillText(shieldActive ? `${Math.ceil(shieldTimer/60)}s` : `×${shieldCharges}`, s.bx+s.bw/2, s.by+s.bh/2+16);
  ctx.globalAlpha=1; ctx.restore();

  // ── Heal button ──
  ctx.save();
  ctx.globalAlpha = healCharges>0 ? 0.9 : 0.4;
  ctx.fillStyle = healCharges>0 ? '#882233' : '#221122';
  rr(h.bx, h.by, h.bw, h.bh, 14); ctx.fill();
  ctx.strokeStyle='rgba(255,120,150,0.7)'; ctx.lineWidth=2; ctx.stroke();
  ctx.font='26px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('❤️', h.bx+h.bw/2, h.by+h.bh/2-8);
  ctx.font='bold 12px sans-serif'; ctx.fillStyle='#ffffff';
  ctx.fillText(`×${healCharges}`, h.bx+h.bw/2, h.by+h.bh/2+16);
  ctx.globalAlpha=1; ctx.restore();

  // ── Joystick base ──
  ctx.save();
  ctx.globalAlpha=0.45;
  ctx.fillStyle='#334455';
  ctx.beginPath(); ctx.arc(j.cx,j.cy,joy.radius,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(150,200,255,0.55)'; ctx.lineWidth=2; ctx.stroke();
  ctx.fillStyle='rgba(150,200,255,0.3)'; ctx.font='13px sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('🕹️', j.cx, j.cy);
  ctx.globalAlpha=1; ctx.restore();

  // Knob
  const kx = j.cx + joy.dx*joy.radius*0.75;
  const ky = j.cy + joy.dy*joy.radius*0.75;
  ctx.save();
  ctx.globalAlpha = joy.active ? 0.95 : 0.65;
  ctx.fillStyle='#4488cc';
  ctx.beginPath(); ctx.arc(kx,ky,joy.knobR,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(180,220,255,0.8)'; ctx.lineWidth=2; ctx.stroke();
  ctx.globalAlpha=1; ctx.restore();
}

// ── MENU ────────────────────────────────────────────────────
function drawMenu() {
  ctx.fillStyle='rgba(0,0,0,0.72)'; ctx.fillRect(0,0,CW,CH);
  ctx.textAlign='center'; ctx.textBaseline='middle';

  ctx.font='60px serif'; ctx.fillText('🦞', CW/2, CH*0.15);
  ctx.font='bold 26px sans-serif'; ctx.fillStyle='#FFD700';
  ctx.fillText('小龙虾大逃亡', CW/2, CH*0.27);

  ctx.font='14px sans-serif'; ctx.fillStyle='#ddffdd';
  ctx.fillText('躲避所有怪物！收集金币！', CW/2, CH*0.36);

  const tips = [
    '🕹️ 右侧摇杆：全方向移动',
    '🛡️ 左上按钮：激活护盾（每300m获得）',
    '❤️ 左下按钮：回血+1（每800m获得）',
    '🪙 跑过金币自动收集',
    '⚠️ 三条命耗尽即死亡',
  ];
  ctx.font='12px sans-serif'; ctx.fillStyle='#cccccc';
  tips.forEach((t,i)=>ctx.fillText(t, CW/2, CH*0.46+i*22));

  if (bestDist>0) {
    ctx.font='13px sans-serif'; ctx.fillStyle='#aaddff';
    ctx.fillText(`最远记录: ${bestDist}m`, CW/2, CH*0.72);
  }
  ctx.font='12px sans-serif'; ctx.fillStyle='#FFD700';
  ctx.fillText(`累计金币: 🪙${totalCoins}`, CW/2, CH*0.77);

  ctx.fillStyle='#cc3300'; rr(CW/2-80,CH*0.83,160,52,14); ctx.fill();
  ctx.font='bold 20px sans-serif'; ctx.fillStyle='#ffffff';
  ctx.fillText('开始游戏 🦞', CW/2, CH*0.83+26);
}

// ── DEATH SCREEN ────────────────────────────────────────────
function drawDead() {
  ctx.fillStyle='rgba(0,0,0,0.80)'; ctx.fillRect(0,0,CW,CH);
  ctx.textAlign='center'; ctx.textBaseline='middle';

  ctx.font='bold 30px sans-serif'; ctx.fillStyle='#FF4500';
  ctx.fillText('💀 虾小弟阵亡！', CW/2, CH*0.15);

  const px=CW*0.07, py=CH*0.23, pw=CW*0.86, ph=CH*0.48;
  ctx.fillStyle='rgba(255,255,255,0.07)'; rr(px,py,pw,ph,16); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=2; ctx.stroke();

  ctx.font='15px sans-serif'; ctx.fillStyle='#ffffff';
  const rows=[
    `🏊 本次距离：${Math.floor(distance)}m`,
    `🏆 最远记录：${bestDist}m`,
    `🪙 本次金币：${coinsCollected}`,
    `🪙 累计金币：${totalCoins}`,
    `👾 躲过怪物：${monstersAvoided}只`,
  ];
  rows.forEach((r,i)=>ctx.fillText(r, CW/2, py+32+i*34));

  if (Math.floor(distance)>=bestDist && bestDist>0) {
    ctx.font='bold 16px sans-serif'; ctx.fillStyle='#FFD700';
    ctx.fillText('🎉 新纪录！', CW/2, py+ph-18);
  }

  ctx.fillStyle='#228B22'; rr(CW/2-80,CH*0.80,160,52,14); ctx.fill();
  ctx.font='bold 19px sans-serif'; ctx.fillStyle='#ffffff';
  ctx.fillText('再来一次 🦞', CW/2, CH*0.80+26);
}

// ── INPUT ───────────────────────────────────────────────────
function canvasPos(cx,cy) {
  const rect=canvas.getBoundingClientRect();
  return { x:(cx-rect.left)*(CW/rect.width), y:(cy-rect.top)*(CH/rect.height) };
}

const keys={};
document.addEventListener('keydown', e=>{
  keys[e.code]=true;
  if(state==='play'){
    if(e.code==='KeyQ') useShield();
    if(e.code==='KeyE') useHeal();
  }
});
document.addEventListener('keyup', e=>{ keys[e.code]=false; });

function isRightSide(x) { return x > CW/2; }

function joyStart(cx,cy,id){
  const j=getJoyLayout();
  joy.active=true; joy.touchId=id;
  joy.baseX=j.cx; joy.baseY=j.cy; joy.dx=0; joy.dy=0;
}
function joyMove(cx,cy){
  const raw_dx=cx-joy.baseX, raw_dy=cy-joy.baseY;
  const md=joy.maxDrag;
  joy.dx=Math.max(-1,Math.min(1,raw_dx/md));
  joy.dy=Math.max(-1,Math.min(1,raw_dy/md));
}
function joyEnd(){ joy.active=false; joy.touchId=null; joy.dx=0; joy.dy=0; }

function btnDown(cx,cy,id){
  const s=getShieldBtnLayout(), h=getHealBtnLayout();
  if(cx>=s.bx&&cx<=s.bx+s.bw&&cy>=s.by&&cy<=s.by+s.bh){ btnShield.pressed=true; btnShield.touchId=id; useShield(); }
  if(cx>=h.bx&&cx<=h.bx+h.bw&&cy>=h.by&&cy<=h.by+h.bh){ btnHeal.pressed=true; btnHeal.touchId=id; useHeal(); }
}
function btnUp(id){
  if(btnShield.touchId===id||id===null){ btnShield.pressed=false; btnShield.touchId=null; }
  if(btnHeal.touchId===id||id===null)  { btnHeal.pressed=false;   btnHeal.touchId=null;   }
}

function menuTap(cx,cy){
  if(state==='menu'){
    const sy=CH*0.83, sh=52;
    if(cy>=sy&&cy<=sy+sh&&cx>=CW/2-80&&cx<=CW/2+80){ initGame(); state='play'; }
  } else if(state==='dead'){
    const sy=CH*0.80, sh=52;
    if(cy>=sy&&cy<=sy+sh&&cx>=CW/2-80&&cx<=CW/2+80){ initGame(); state='play'; }
  }
}

canvas.addEventListener('touchstart', e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    const p=canvasPos(t.clientX,t.clientY);
    if(state!=='play'){ menuTap(p.x,p.y); continue; }
    if(isRightSide(p.x)) joyStart(p.x,p.y,t.identifier);
    else btnDown(p.x,p.y,t.identifier);
  }
},{passive:false});

canvas.addEventListener('touchmove', e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    const p=canvasPos(t.clientX,t.clientY);
    if(t.identifier===joy.touchId) joyMove(p.x,p.y);
  }
},{passive:false});

canvas.addEventListener('touchend', e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier===joy.touchId) joyEnd();
    else btnUp(t.identifier);
  }
},{passive:false});

canvas.addEventListener('touchcancel', e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier===joy.touchId) joyEnd();
    else btnUp(t.identifier);
  }
},{passive:false});

let mouseDown=false, mouseRight=false;
canvas.addEventListener('mousedown', e=>{
  const p=canvasPos(e.clientX,e.clientY);
  if(state!=='play'){ menuTap(p.x,p.y); return; }
  mouseDown=true; mouseRight=isRightSide(p.x);
  if(mouseRight) joyStart(p.x,p.y,'mouse');
  else btnDown(p.x,p.y,'mouse');
});
canvas.addEventListener('mousemove', e=>{
  if(!mouseDown) return;
  const p=canvasPos(e.clientX,e.clientY);
  if(mouseRight) joyMove(p.x,p.y);
});
canvas.addEventListener('mouseup', e=>{
  if(!mouseDown) return; mouseDown=false;
  if(mouseRight) joyEnd(); else btnUp('mouse');
});
canvas.addEventListener('mouseleave', ()=>{
  if(mouseDown){ mouseDown=false; if(mouseRight)joyEnd(); else btnUp('mouse'); }
});

// ── LOOP ────────────────────────────────────────────────────
let last=0;
function loop(ts){
  requestAnimationFrame(loop);
  if(ts-last<14) return; last=ts;
  update(); draw();
}

initGame(); state='menu'; requestAnimationFrame(loop);
</script>
